<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Access</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
    }

    .dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #bbb;
    }

    #pin-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
      justify-items: center;
    }

    .pin-btn {
      background: rgba(255, 255, 255, 0.15);
      color: #f2e5ff;
      border: none;
      border-radius: 50%;
      width: 95px;
      height: 95px;
      font-size: 1.6rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 0 8px rgba(178, 102, 255, 0.3);
    }

    .pin-btn:hover {
      background: rgba(178, 102, 255, 0.35);
      transform: scale(1.07);
    }

    .pin-btn:active {
      background: rgba(178, 102, 255, 0.5);
    }

    #pw-msg {
      height: 24px;
      color: #ffb3b3;
      font-weight: 500;
      font-size: 1rem;
    }

    /* === Untuk Tablet dan HP === */
    @media (max-width: 768px) {
      .login-card {
        width: 90%;
        padding: 70px 35px;
      }

      .pin-btn {
        width: 95px;
        height: 95px;
        font-size: 1.7rem;
      }
    }

    @media (max-width: 480px) {
      .login-card {
        width: 92%;
        padding: 65px 25px;
      }

      .pin-btn {
        width: 90px;
        height: 90px;
        font-size: 1.6rem;
      }

      .dot {
        width: 18px;
        height: 18px;
      }
    }

    /* === Untuk Laptop / Desktop besar === */
    @media (min-width: 1024px) {
      .login-card {
        transform: scale(0.7);
        /* lebih kecil di laptop */
      }
    }
  </style>
</head>

<body>
  <div id="pw-gate" style="
    position: fixed; inset: 0;
    background: url('static/images/image6.jpeg') center/cover no-repeat;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    z-index: 9999;
    font-family: 'Poppins', sans-serif;
    backdrop-filter: blur(4px);
    color: white;
    text-align: center;
  ">
    <div class="login-card" style="
      background: rgba(0,0,0,0.55);
      padding: 60px 45px;
      border-radius: 22px;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
      width: 85%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    ">
      <h2 style="
        margin-bottom: 18px;
        font-size: 2.5rem;
        font-weight: 700;
        color: #e0c9ff;
        text-shadow: 0 0 8px #d88db8;
      ">
        Birthday Access
      </h2>

      <p style="color: #d88db8; font-size:1rem;">
        Masukkan PIN untuk membuka akses.<br>
        Jika kamu salah memasukkan kata sandi sebanyak 5 kali berturut-turut, akses akan diblokir sementara dan kamu
        harus menunggu <br> 1 hari penuh sebelum dapat mencoba lagi.
        <br>Pikirkan baik-baik — mungkin password-nya lebih dekat daripada yang kamu kira!.
      </p>

      <div id="pin-display" style="
        display: flex;
        justify-content: center;
        gap: 10px;
        margin: 25px 0;
      ">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div id="pin-keypad">
        <button class="pin-btn">1</button>
        <button class="pin-btn">2</button>
        <button class="pin-btn">3</button>
        <button class="pin-btn">4</button>
        <button class="pin-btn">5</button>
        <button class="pin-btn">6</button>
        <button class="pin-btn">7</button>
        <button class="pin-btn">8</button>
        <button class="pin-btn">9</button>
        <button class="pin-btn">←</button>
        <button class="pin-btn">0</button>
        <button class="pin-btn">✔</button>
      </div>

      <p id="pw-msg"></p>
    </div>
  </div>

  <script>
    const PASSWORD = "151006";
    let inputPIN = "";
    const dots = document.querySelectorAll(".dot");
    const msg = document.getElementById("pw-msg");
    const gate = document.getElementById("pw-gate");

    document.querySelectorAll(".pin-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const val = btn.textContent.trim();

        if (val === "←") {
          inputPIN = inputPIN.slice(0, -1);
        } else if (val === "✔") {
          checkPIN();
          return;
        } else {
          if (inputPIN.length < 6) inputPIN += val;
        }
        updateDots();
      });
    });

    function updateDots() {
      dots.forEach((dot, i) => {
        dot.style.background = i < inputPIN.length ? "#d88db8" : "#bbb";
      });
    }

    function checkPIN() {
      if (inputPIN === PASSWORD) {
        msg.textContent = "";
        gate.style.transition = "opacity 0.8s ease";
        gate.style.opacity = "0";
        setTimeout(() => {
          gate.style.display = "none";
          window.location.href = "name.html";
        }, 800);
      } else {
        msg.textContent = "PIN salah 🤣";
        inputPIN = "";
        updateDots();
      }
    }
  </script>
</body>

</html>
